services:
  - type: web
    name: astram-traffic-hub
    env: python
    buildCommand: "cd frontend && npm install && npm run build && mkdir -p ../backend/static && cp -r dist/* ../backend/static/ && cd ../backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAPPLS_ACCESS_TOKEN
        sync: false
